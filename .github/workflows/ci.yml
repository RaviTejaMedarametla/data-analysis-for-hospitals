name: CI

on:
  push:
  pull_request:

jobs:
  tests:
    runs-on: ubuntu-latest
    env:
      PYTHONHASHSEED: "42"
      OMP_NUM_THREADS: "1"
      MKL_NUM_THREADS: "1"
      OPENBLAS_NUM_THREADS: "1"
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.10"
          cache: "pip"
          cache-dependency-path: |
            requirements-lock.txt

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install --requirement requirements-lock.txt

      - name: Run tests with coverage
        run: |
          pytest

      - name: Run CLI smoke checks
        run: |
          python "Data Analysis for Hospitals/task/cli.py" manifest > /tmp/manifest.json
          python "Data Analysis for Hospitals/task/cli.py" run > /tmp/run.json
          python "Data Analysis for Hospitals/task/cli.py" ablation > /tmp/ablation.json
