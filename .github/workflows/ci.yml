name: CI

on:
  push:
  pull_request:

jobs:
  tests:
    runs-on: ubuntu-latest
    env:
      PYTHONHASHSEED: "42"
      OMP_NUM_THREADS: "1"
      MKL_NUM_THREADS: "1"
      OPENBLAS_NUM_THREADS: "1"
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.10"
          cache: "pip"
          cache-dependency-path: |
            requirements.txt

      - name: Install dependencies (reproducible)
        run: |
          python -m pip install --upgrade pip
          pip install --requirement requirements.txt

      - name: Run unit tests
        run: |
          pytest -q "Data Analysis for Hospitals/task/test_numpy_compat.py"

      - name: Run CLI smoke checks
        run: |
          cd "Data Analysis for Hospitals/task"
          python cli.py manifest > /tmp/manifest.json
          python cli.py run > /tmp/run.json
          python cli.py early-warning-experiment > /tmp/early_warning.json
